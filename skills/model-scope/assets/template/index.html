<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>model-scope — interactive model explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{ --bg:#f4f3ee; --surface:#fff; --surface-2:#f1efe8; --edge:#e4e1d7; --edge-2:#d6d2c5; --ink:#33312c; --ink-dim:#6f6b61; --ink-faint:#a39e91; --accent:#4a7a93; --accent-soft:rgba(74,122,147,.12);
  --sans:'IBM Plex Sans',system-ui,sans-serif; --mono:'IBM Plex Mono',ui-monospace,monospace; }
*{box-sizing:border-box} html,body{height:100%}
body{margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans); font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased; overflow:hidden}
.app{display:grid; grid-template-rows:auto 1fr; grid-template-columns:minmax(0,1fr); height:100vh}
header.topbar{display:flex; align-items:center; justify-content:space-between; gap:24px; padding:12px 22px; border-bottom:1px solid var(--edge); background:var(--surface)}
.brand{font-family:var(--mono); font-size:12px; color:var(--ink-dim)} .brand b{color:var(--ink); font-weight:600}
.models{display:flex; gap:4px; padding:4px; border:1px solid var(--edge); border-radius:12px; background:var(--surface-2); min-width:0; overflow-x:auto; scrollbar-width:thin}
.models::-webkit-scrollbar{height:6px} .models::-webkit-scrollbar-thumb{background:var(--edge-2);border-radius:6px}
.models button{font-family:var(--sans); font-size:12.5px; font-weight:500; color:var(--ink-dim); background:transparent; border:0; padding:7px 13px; border-radius:8px; cursor:pointer; white-space:nowrap}
.models button:hover{color:var(--ink); background:rgba(0,0,0,.04)} .models button[aria-pressed="true"]{color:#fff; background:var(--accent); font-weight:600}
.lenses{display:flex; gap:5px; align-items:center}
.lenses .ll{font-family:var(--mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-faint); margin-right:3px}
.lenses button{font-family:var(--sans); font-size:12px; font-weight:500; color:var(--ink-dim); background:var(--surface); border:1px solid var(--edge-2); padding:6px 12px; border-radius:7px; cursor:pointer; white-space:nowrap}
.lenses button:hover{color:var(--ink); border-color:var(--ink-faint)} .lenses button[aria-pressed="true"]{color:#fff; background:var(--accent); border-color:var(--accent); font-weight:600}
.tbar .transport{display:flex; align-items:center; gap:12px; flex:1; min-width:0}
.tbar .sep{width:1px; align-self:stretch; background:var(--edge); margin:2px 2px}
.tip{font-family:var(--mono); font-size:10.5px; color:var(--ink-faint); max-width:300px; text-align:right}
.layout{display:grid; grid-template-columns:330px minmax(0,1fr); min-height:0}
aside.console{border-right:1px solid var(--edge); overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:18px; background:var(--surface)}
.console::-webkit-scrollbar{width:9px}.console::-webkit-scrollbar-thumb{background:var(--edge-2);border-radius:6px}
.right{display:grid; grid-template-rows:auto 1fr; min-height:0; background:var(--bg); position:relative}
#loading{position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; gap:13px; background:rgba(244,243,238,.86); -webkit-backdrop-filter:blur(2px); backdrop-filter:blur(2px); z-index:20}
#loading.on{display:flex}
#loading .ttl{font-family:var(--mono); font-size:12px; color:var(--ink-dim); letter-spacing:.05em}
#loading .barwrap{width:min(320px,55%); height:6px; border-radius:6px; background:var(--edge-2); overflow:hidden}
#loading .bar{height:100%; width:0%; background:var(--accent); transition:width .12s}
#loading .sub{font-family:var(--mono); font-size:10.5px; color:var(--ink-faint)}
.block{display:flex; flex-direction:column; gap:11px}
.block>.lbl{font-family:var(--mono); font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-faint); display:flex; align-items:center; gap:8px}
.block>.lbl::after{content:""; flex:1; height:1px; background:var(--edge)}
.blurb{font-size:12.5px; color:var(--ink-dim); line-height:1.5} .note{font-size:11.5px; color:var(--ink-dim); line-height:1.5; padding:9px 11px; border-radius:8px; background:var(--accent-soft); border:1px solid rgba(74,122,147,.2); border-left:2px solid var(--accent)}
.field{display:flex; flex-direction:column; gap:6px} .field .row{display:flex; align-items:baseline; justify-content:space-between; gap:8px} .field label{font-size:12.5px; font-weight:500} .field .unit{color:var(--ink-faint); font-size:11px; font-family:var(--mono)}
.field .num{width:82px; font-family:var(--mono); font-size:12.5px; text-align:right; color:var(--ink); background:var(--surface-2); border:1px solid var(--edge-2); border-radius:6px; padding:3px 7px} .field .num:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.field .toggle{appearance:none;-webkit-appearance:none;width:38px;height:21px;border-radius:11px;background:var(--edge-2);position:relative;cursor:pointer;transition:.15s;flex:0 0 auto;margin:0}
.field .toggle:checked{background:var(--accent)} .field .toggle::after{content:"";position:absolute;top:2px;left:2px;width:17px;height:17px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.2);transition:.15s} .field .toggle:checked::after{left:19px}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:4px;cursor:pointer;margin:6px 0 2px;background:linear-gradient(90deg,var(--accent) 0 var(--fill,50%),var(--edge-2) var(--fill,50%) 100%)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:#fff;border:2px solid var(--accent);box-shadow:0 1px 3px rgba(0,0,0,.12);cursor:pointer}
input[type=range]::-moz-range-thumb{width:15px;height:15px;border-radius:50%;background:#fff;border:2px solid var(--accent);cursor:pointer}
.seed{display:flex; gap:8px} .seed input{flex:1; font-family:var(--mono); font-size:12.5px; color:var(--ink); background:var(--surface-2); border:1px solid var(--edge-2); border-radius:7px; padding:7px 10px} .seed input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)} .seed .dice{width:38px;border-radius:7px;border:1px solid var(--edge-2);background:var(--surface-2);color:var(--ink-dim);cursor:pointer;font-size:16px}
.actions{display:grid; grid-template-columns:1fr 1fr; gap:9px} .btn{font-family:var(--sans); font-size:13px; font-weight:600; cursor:pointer; border-radius:9px; padding:11px 12px; border:1px solid var(--edge-2); background:var(--surface); color:var(--ink); transition:.15s; display:flex; align-items:center; justify-content:center; gap:7px} .btn:hover{border-color:var(--ink-faint); background:var(--surface-2)} .btn.primary{grid-column:1/-1; background:var(--accent); color:#fff; border:0; padding:13px}
.tbar{display:flex; align-items:center; gap:12px; padding:9px 18px; border-bottom:1px solid var(--edge); background:var(--surface)}
.tbar.hidden{display:none}
.tctrl{display:flex; gap:5px} .tctrl button{width:32px;height:30px;border-radius:7px;border:1px solid var(--edge-2);background:var(--surface);color:var(--ink-dim);cursor:pointer;display:grid;place-items:center} .tctrl button:hover{color:var(--accent);border-color:var(--accent)} .tctrl button svg{width:13px;height:13px;fill:currentColor}
.scrub{flex:1;min-width:60px} .tread{font-family:var(--mono);font-size:11.5px;color:var(--ink-dim);white-space:nowrap;min-width:120px;text-align:right} .tread b{color:var(--ink);font-weight:600}
.spd{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10.5px;color:var(--ink-faint)} .spd input{width:90px}
.views{padding:12px; overflow:auto; display:grid; gap:12px; grid-template-columns:repeat(auto-fit,minmax(360px,1fr)); grid-auto-rows:minmax(258px,1fr); align-content:start}
.views::-webkit-scrollbar{width:9px}.views::-webkit-scrollbar-thumb{background:var(--edge-2);border-radius:6px}
.plot{position:relative; border:1px solid var(--edge); border-radius:10px; overflow:hidden; background:var(--surface); min-height:258px} .plot canvas{position:absolute; inset:0; width:100%; height:100%; display:block}
@media (max-width:1000px){ body{overflow:auto} .app{height:auto} .layout{grid-template-columns:1fr} .right{height:auto} .views{grid-template-columns:1fr; grid-auto-rows:300px} }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand"><b>model-scope</b> — move a slider, watch the result change</div>
    <nav class="models" id="modelTabs" aria-label="Model"></nav>
    <div class="tip" id="tip"></div>
  </header>
  <div class="layout">
    <aside class="console">
      <div class="block"><div class="lbl">Model</div><div class="blurb" id="blurb"></div><div class="note" id="note"></div></div>
      <div class="block"><div class="lbl">Parameters</div><div id="paramFields" style="display:flex;flex-direction:column;gap:14px"></div></div>
      <div class="block"><div class="lbl">Run</div>
        <div class="field"><div class="row"><label for="seedInput">RNG seed</label></div><div class="seed"><input id="seedInput" type="text" value="model-scope" spellcheck="false"/><button class="dice" id="diceBtn" title="Randomise">⚂</button></div></div>
        <div class="actions"><button class="btn primary" id="runBtn">↻ Re-simulate</button><button class="btn" id="resetBtn">⨯ Reset</button></div>
        <div class="field" style="margin-top:12px">
          <div class="row"><label for="fontScale">Text size</label><span id="fontScaleVal" style="font-family:var(--mono);font-size:11px;color:var(--ink-dim)">100%</span></div>
          <input id="fontScale" type="range" min="0.8" max="1.8" step="0.05" value="1" aria-label="Text size in the plots"/>
        </div>
      </div>
    </aside>
    <div class="right">
      <div class="tbar hidden" id="tbar">
        <div class="lenses" id="lensSwitch" style="display:none"></div>
        <div class="sep" id="lensSep" style="display:none"></div>
        <div class="transport" id="transport">
          <div class="tctrl">
            <button id="toStartBtn" title="Restart"><svg viewBox="0 0 16 16"><rect x="3" y="3" width="2" height="10"/><path d="M13 3l-7 5 7 5z"/></svg></button>
            <button id="playBtn" title="Play / pause"><svg id="playIcon" viewBox="0 0 16 16"><path d="M4 3l9 5-9 5z"/></svg></button>
            <button id="toEndBtn" title="Fast-forward to end"><svg viewBox="0 0 16 16"><path d="M3 3l7 5-7 5z"/><rect x="11" y="3" width="2" height="10"/></svg></button>
          </div>
          <div class="tctrl" id="stepCtrl" style="display:none">
            <button id="stepBackBtn" title="Previous step"><svg viewBox="0 0 16 16"><path d="M11 3v10L4 8z"/></svg></button>
            <button id="stepFwdBtn" title="Next step"><svg viewBox="0 0 16 16"><path d="M5 3v10l7-5z"/></svg></button>
          </div>
          <input type="range" id="scrub" class="scrub" min="0" max="100" value="0" step="1" aria-label="Step"/>
          <span class="tread" id="tread">0 / 0</span>
          <div class="spd">speed<input type="range" id="spd" min="1" max="800" step="1" value="12"/></div>
        </div>
      </div>
      <div class="views" id="views"></div>
      <div id="loading"><div class="ttl">computing…</div><div class="barwrap"><div class="bar" id="loadingBar"></div></div><div class="sub" id="loadingSub"></div></div>
    </div>
  </div>
</div>
<script src="plot.js"></script>
<script src="modules/mslib.js"></script>   <!-- optional reusable model library (window.MSLIB) -->
<script src="engine.js"></script>
<script>
(function(){
"use strict";
const $=(s,r=document)=>r.querySelector(s); const sleep=()=>new Promise(r=>setTimeout(r));
const clamp=(x,a,b)=>Math.min(b,Math.max(a,x));
const reduceMotion = matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches;
const S={ modelId:SIM.MODEL_ORDER[0], params:{}, seed:'model-scope', data:null, model:null,
  views:[], canvases:[], anim:null, length:1, maxHead:1, head:1, playing:false, speed:12, lastT:null, rafId:0, gen:0, suppress:false,
  stageMode:false, stageList:null, lens:null, lensKeys:null };
// a model may declare lenses:{angleA,angleB,…} — several ANGLES over the SAME simulate() data.
// activeSpec() is the object that supplies views/anim/stages right now: the active lens, or the model itself.
function activeSpec(){ return (S.model&&S.model.lenses&&S.lens) ? S.model.lenses[S.lens] : S.model; }
const esc=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
// optional deep-link state: ?model=&lens=&head=&still=1&text=  (applied once on load — lets you share/screenshot an exact view)
const Q=(()=>{ try{ const o={}, p=new URLSearchParams(location.search); for(const[k,v] of p) o[k]=v; return o; }catch(e){ return {}; } })();
let qFirst=true;

function buildModelTabs(){ const nav=$('#modelTabs'); nav.innerHTML='';
  SIM.MODEL_ORDER.forEach(id=>{ const b=document.createElement('button'); b.textContent=SIM.MODELS[id].name; b.setAttribute('aria-pressed',id===S.modelId); b.onclick=()=>setModel(id); nav.appendChild(b); }); }
function buildLensSwitch(){ const box=$('#lensSwitch'), sep=$('#lensSep'); box.innerHTML='';
  if(!S.lensKeys){ box.style.display='none'; sep.style.display='none'; return; }
  box.style.display='flex'; sep.style.display='block';
  const lab=document.createElement('span'); lab.className='ll'; lab.textContent='level'; box.appendChild(lab);
  S.lensKeys.forEach(k=>{ const L=S.model.lenses[k], b=document.createElement('button'); b.textContent=L.label||k;
    b.setAttribute('aria-pressed',k===S.lens); b.title=L.about||''; b.onclick=()=>switchLens(k); box.appendChild(b); }); }
function switchLens(k){ if(k===S.lens) return; S.lens=k; stopAll();
  [...$('#lensSwitch').querySelectorAll('button')].forEach(b=>b.setAttribute('aria-pressed', b.textContent===(S.model.lenses[k].label||k)));
  bindLens(); }   // same data, different zoom level — no re-simulate
function makeField(spec,obj,onChange){
  if(spec.type==='bool'){ const wrap=document.createElement('div'); wrap.className='field';     // boolean → a toggle switch
    const row=document.createElement('div'); row.className='row'; const lab=document.createElement('label'); lab.textContent=spec.label||spec.name; lab.htmlFor='f_'+spec.name;
    const sw=document.createElement('input'); sw.type='checkbox'; sw.className='toggle'; sw.id='f_'+spec.name;
    sw.checked = obj[spec.name]!==undefined ? !!obj[spec.name] : !!spec.default; obj[spec.name]=sw.checked;
    sw.addEventListener('change',()=>{ obj[spec.name]=sw.checked; onChange&&onChange(); });
    row.appendChild(lab); row.appendChild(sw); wrap.appendChild(row); return wrap; }
  const wrap=document.createElement('div'); wrap.className='field';
  const row=document.createElement('div'); row.className='row'; const lab=document.createElement('label'); lab.textContent=spec.label||spec.name; lab.htmlFor='f_'+spec.name;
  const num=document.createElement('input'); num.className='num'; num.type='number'; num.min=spec.min; num.max=spec.max; num.step=spec.step; num.id='f_'+spec.name;
  if(spec.unit){ const u=document.createElement('span'); u.className='unit'; u.textContent=spec.unit; lab.appendChild(document.createTextNode(' ')); lab.appendChild(u); }
  row.appendChild(lab); row.appendChild(num); const range=document.createElement('input'); range.type='range'; range.min=spec.min; range.max=spec.max; range.step=spec.step;
  wrap.appendChild(row); wrap.appendChild(range);
  const fill=v=>range.style.setProperty('--fill',clamp((v-spec.min)/(spec.max-spec.min)*100,0,100)+'%');
  const apply=v=>{ v=clamp(spec.int?Math.round(v):v,spec.min,spec.max); obj[spec.name]=v; num.value=spec.int?v:+v.toFixed(4); range.value=v; fill(v); onChange&&onChange(); };
  range.addEventListener('input',()=>apply(parseFloat(range.value)));
  num.addEventListener('input',()=>{const v=parseFloat(num.value); if(!Number.isNaN(v)){obj[spec.name]=clamp(v,spec.min,spec.max); range.value=obj[spec.name]; fill(obj[spec.name]); onChange&&onChange();}});
  num.addEventListener('blur',()=>apply(parseFloat(num.value)||spec.default)); apply(obj[spec.name]!==undefined?obj[spec.name]:spec.default); return wrap; }
function setModel(id){ S.suppress=true; stopAll(); S.modelId=id; const m=SIM.MODELS[id]; S.model=m;
  [...$('#modelTabs').children].forEach(b=>b.setAttribute('aria-pressed',b.textContent===m.name));
  S.lensKeys = m.lenses ? Object.keys(m.lenses) : null; S.lens = S.lensKeys ? S.lensKeys[0] : null;
  if(qFirst && Q.lens && m.lenses && m.lenses[Q.lens]) S.lens=Q.lens; buildLensSwitch();
  $('#blurb').textContent=m.blurb||''; $('#note').textContent=m.note||'';
  const box=$('#paramFields'); box.innerHTML=''; S.params={}; (m.params||[]).forEach(p=>S.params[p.name]=p.default); (m.params||[]).forEach(p=>box.appendChild(makeField(p,S.params,onChange)));
  S.suppress=false; recompute(); }
function onChange(){ if(!S.suppress) schedule(); }
function buildCards(){ const vc=$('#views'); vc.innerHTML=''; S.canvases=S.views.map(()=>{ const d=document.createElement('div'); d.className='plot'; const cv=document.createElement('canvas'); d.appendChild(cv); vc.appendChild(d); return cv; }); }

/* ---- simulate (shared by all lenses), then bind the active lens ---- */
function recompute(){ clearTimeout(rt); stopAll(); const myGen=S.gen; S.seed=$('#seedInput').value||'seed';
  const env={ rng:SIM.makeRNG(S.seed), seed:S.seed, params:{...S.params} };
  try{ S.data=S.model.simulate({...S.params}, env); }catch(e){ S.data=null; console.error(e); }
  if(myGen!==S.gen) return; bindLens(); }
// bind the active lens (or the model itself if it declares none): its views + transport + playhead, over the SAME data
function bindLens(){ const spec=activeSpec(); S.views=spec.views||[]; buildCards();
  $('#tip').textContent = (S.model.lenses&&spec.about) ? spec.about : (spec.stages?'move a slider, or step through each stage':spec.anim?'move a slider, or play to watch it build':'move a slider, watch the views update');
  S.stageList = spec.stages ? ((typeof spec.stages==='function') ? spec.stages(S.params, S.data) : spec.stages) : null;
  S.stageMode = !!(S.stageList && S.stageList.length); S.anim = spec.anim || null;
  S.length = S.stageMode ? S.stageList.length : (S.anim ? Math.max(1, S.anim.length(S.params, S.data)) : 1);
  S.maxHead = S.stageMode ? Math.max(0, S.length-1) : S.length;   // stages: head∈[0,len-1] (one unit/stage); continuous: [0,len]
  const seq = S.stageMode || !!S.anim;
  $('#tbar').classList.toggle('hidden', !(S.lensKeys || seq));    // keep the bar (for the lens switch) even if THIS lens is static
  $('#transport').style.display = seq ? 'flex' : 'none';
  $('#stepCtrl').style.display = S.stageMode ? 'flex' : 'none';
  const spd=$('#spd'); if(S.stageMode){ spd.min=0.2; spd.max=8; spd.step=0.1; spd.value=1.4; S.speed=1.4; } else { spd.min=1; spd.max=800; spd.step=1; spd.value=12; S.speed=12; }
  const useQ = qFirst && (Q.still==='1' || Q.head!=null); qFirst=false;       // deep-link: freeze at a requested frame for a clean screenshot
  if(useQ){ S.head = Q.head!=null ? clamp(parseFloat(Q.head), 0, S.maxHead) : S.maxHead; readout(); drawAll(); return; }
  S.head = (seq && !reduceMotion) ? 0 : S.maxHead;
  readout(); if(seq && !reduceMotion){ play(); } else { drawAll(); } }
function drawAll(){ const stg = S.stageMode ? Math.min(S.length-1, Math.max(0, Math.floor(S.head))) : null;
  const ui={ head:S.head, playing:S.playing, params:S.params, frac:S.head-Math.floor(S.head),
    stage:stg, stageKey:(stg!=null && S.stageList[stg]) ? S.stageList[stg].key : null, stages:S.stageList, nStages:S.stageMode?S.length:0 };
  for(let i=0;i<S.views.length;i++){
    try{ S.views[i].draw(Plot.make(S.canvases[i]), S.data, ui); }
    catch(e){ console.error('[model-scope] view draw failed', { model:S.modelId, view:S.views[i]&&S.views[i].title, index:i, error:e });
      try{ Plot.make(S.canvases[i]).note('view error: '+((e&&e.message)||e)); }catch(_){} } } }
let rt; function schedule(){ clearTimeout(rt); rt=setTimeout(()=>{ if(!S.suppress) recompute(); }, 220); }

/* ---- playhead (for sequential models) ---- */
function loop(now){ if(S.lastT==null) S.lastT=now; const fdt=Math.min(0.1,(now-S.lastT)/1000); S.lastT=now;   // wall-clock → frame-rate independent
  if(S.playing){ S.head=Math.min(S.maxHead, S.head + S.speed*fdt); if(S.head>=S.maxHead) S.playing=false; }    // stop BEFORE drawing the final frame (so views see frac→1, not 0)
  drawAll(); readout();
  if(S.playing) S.rafId=requestAnimationFrame(loop); else { S.rafId=0; pico(); } }
function play(){ if(S.head>=S.maxHead) S.head=0; S.playing=true; S.lastT=null; pico(); cancelAnimationFrame(S.rafId); S.rafId=requestAnimationFrame(loop); }
function pause(){ S.playing=false; pico(); }
function stopAll(){ S.gen++; window.__simGen=S.gen; S.playing=false; cancelAnimationFrame(S.rafId); S.rafId=0; if(window.__setLoading)window.__setLoading(false); }   // new gen → in-flight runChunks() bail; clear any stale overlay
function readout(){ const sc=$('#scrub'); sc.max=Math.max(1,S.maxHead); sc.value=S.head; sc.style.setProperty('--fill',(S.maxHead?S.head/S.maxHead*100:0)+'%');
  if(S.stageMode){ const k=Math.min(S.length-1,Math.max(0,Math.floor(S.head))), st=S.stageList[k];
    $('#tread').innerHTML=`<b>${k+1}</b> / ${S.length} — ${st?esc(st.name):''}`; }
  else { const k=Math.min(S.length,Math.floor(S.head)); $('#tread').innerHTML=`<b>${k.toLocaleString()}</b> / ${S.length.toLocaleString()}`; } }
function pico(){ $('#playIcon').innerHTML=S.playing?'<rect x="4" y="3" width="3" height="10"/><rect x="9" y="3" width="3" height="10"/>':'<path d="M4 3l9 5-9 5z"/>'; }

$('#runBtn').onclick=()=>recompute();
$('#resetBtn').onclick=()=>{ S.suppress=true; stopAll(); (S.model.params||[]).forEach(p=>{const f=$('#f_'+p.name); if(!f)return; if(f.type==='checkbox'){ f.checked=!!p.default; f.dispatchEvent(new Event('change')); } else { f.value=p.default; f.dispatchEvent(new Event('input')); }}); $('#seedInput').value='model-scope'; S.suppress=false; recompute(); };
$('#diceBtn').onclick=()=>{ $('#seedInput').value='seed-'+Math.floor(Math.random()*1e6).toString(36); schedule(); };
$('#seedInput').addEventListener('input',()=>{ if(!S.suppress) schedule(); });
$('#playBtn').onclick=()=>{ if(S.playing)pause(); else play(); };
$('#toStartBtn').onclick=()=>{ S.head=0; play(); };
$('#toEndBtn').onclick=()=>{ pause(); S.head=S.maxHead; drawAll(); readout(); };
$('#stepBackBtn').onclick=()=>{ pause(); const cur=Math.min(S.maxHead,Math.floor(S.head)); S.head=clamp(cur-1,0,S.maxHead); drawAll(); readout(); };
$('#stepFwdBtn').onclick=()=>{ pause(); const cur=Math.min(S.maxHead,Math.floor(S.head)); S.head=clamp(cur+1,0,S.maxHead); drawAll(); readout(); };
$('#scrub').addEventListener('input',()=>{ pause(); S.head=clamp(+$('#scrub').value,0,S.maxHead); drawAll(); readout(); });
$('#spd').addEventListener('input',()=>{ S.speed=+$('#spd').value; });
$('#fontScale').addEventListener('input',()=>{ window.__plotFontScale=+$('#fontScale').value; $('#fontScaleVal').textContent=Math.round(window.__plotFontScale*100)+'%'; drawAll(); });
let zt; const onResize=()=>{ clearTimeout(zt); zt=setTimeout(drawAll,90); };
addEventListener('resize',onResize); new ResizeObserver(onResize).observe($('#views'));

/* loading overlay + async hooks — a heavy simulate() drives these via runChunks (see engine.js):
   __simGen lets superseded runs bail, __setLoading shows progress, __redraw repaints when a chunk lands. */
window.__simGen=S.gen;
window.__redraw=()=>drawAll();
window.__setLoading=(on,prog,label)=>{ const el=$('#loading'); if(!el)return; el.classList.toggle('on',!!on);
  if(on){ const b=$('#loadingBar'); if(b)b.style.width=Math.round((prog||0)*100)+'%'; const s=$('#loadingSub'); if(s)s.textContent=label||(Math.round((prog||0)*100)+'%'); } };

if(Q.text){ const ts=parseFloat(Q.text); if(ts>0){ window.__plotFontScale=ts; const f=$('#fontScale'); if(f)f.value=ts; const fv=$('#fontScaleVal'); if(fv)fv.textContent=Math.round(ts*100)+'%'; } }
if(Q.model && SIM.MODELS[Q.model]) S.modelId=Q.model;
buildModelTabs(); setModel(S.modelId);
if(document.fonts&&document.fonts.ready) document.fonts.ready.then(drawAll);
})();
</script>
</body>
</html>
