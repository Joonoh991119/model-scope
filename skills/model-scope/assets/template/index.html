<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>model-scope · interactive model explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{ --bg:#f4f3ee; --surface:#fff; --surface-2:#f1efe8; --edge:#e4e1d7; --edge-2:#d6d2c5; --ink:#33312c; --ink-dim:#6f6b61; --ink-faint:#a39e91; --accent:#4a7a93; --accent-soft:rgba(74,122,147,.12);
  --sans:'IBM Plex Sans',system-ui,sans-serif; --mono:'IBM Plex Mono',ui-monospace,monospace; }
*{box-sizing:border-box} html,body{height:100%}
body{margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans); font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased; overflow:hidden}
.app{display:grid; grid-template-rows:auto 1fr; height:100vh}
header.topbar{display:flex; align-items:center; justify-content:space-between; gap:24px; padding:12px 22px; border-bottom:1px solid var(--edge); background:var(--surface)}
.brand{font-family:var(--mono); font-size:12px; color:var(--ink-dim)} .brand b{color:var(--ink); font-weight:600}
.models{display:flex; gap:4px; padding:4px; border:1px solid var(--edge); border-radius:12px; background:var(--surface-2)}
.models button{font-family:var(--sans); font-size:12.5px; font-weight:500; color:var(--ink-dim); background:transparent; border:0; padding:7px 13px; border-radius:8px; cursor:pointer; white-space:nowrap}
.models button:hover{color:var(--ink); background:rgba(0,0,0,.04)} .models button[aria-pressed="true"]{color:#fff; background:var(--accent); font-weight:600}
.tip{font-family:var(--mono); font-size:10.5px; color:var(--ink-faint); max-width:300px; text-align:right}
.layout{display:grid; grid-template-columns:330px minmax(0,1fr); min-height:0}
aside.console{border-right:1px solid var(--edge); overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:18px; background:var(--surface)}
.console::-webkit-scrollbar{width:9px}.console::-webkit-scrollbar-thumb{background:var(--edge-2);border-radius:6px}
.right{display:grid; grid-template-rows:auto 1fr; min-height:0; background:var(--bg)}
.block{display:flex; flex-direction:column; gap:11px}
.block>.lbl{font-family:var(--mono); font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-faint); display:flex; align-items:center; gap:8px}
.block>.lbl::after{content:""; flex:1; height:1px; background:var(--edge)}
.blurb{font-size:12.5px; color:var(--ink-dim); line-height:1.5} .note{font-size:11.5px; color:var(--ink-dim); line-height:1.5; padding:9px 11px; border-radius:8px; background:var(--accent-soft); border:1px solid rgba(74,122,147,.2); border-left:2px solid var(--accent)}
.field{display:flex; flex-direction:column; gap:6px} .field .row{display:flex; align-items:baseline; justify-content:space-between; gap:8px} .field label{font-size:12.5px; font-weight:500} .field .unit{color:var(--ink-faint); font-size:11px; font-family:var(--mono)}
.field .num{width:82px; font-family:var(--mono); font-size:12.5px; text-align:right; color:var(--ink); background:var(--surface-2); border:1px solid var(--edge-2); border-radius:6px; padding:3px 7px} .field .num:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:4px;cursor:pointer;margin:6px 0 2px;background:linear-gradient(90deg,var(--accent) 0 var(--fill,50%),var(--edge-2) var(--fill,50%) 100%)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:#fff;border:2px solid var(--accent);box-shadow:0 1px 3px rgba(0,0,0,.12);cursor:pointer}
input[type=range]::-moz-range-thumb{width:15px;height:15px;border-radius:50%;background:#fff;border:2px solid var(--accent);cursor:pointer}
.seed{display:flex; gap:8px} .seed input{flex:1; font-family:var(--mono); font-size:12.5px; color:var(--ink); background:var(--surface-2); border:1px solid var(--edge-2); border-radius:7px; padding:7px 10px} .seed input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)} .seed .dice{width:38px;border-radius:7px;border:1px solid var(--edge-2);background:var(--surface-2);color:var(--ink-dim);cursor:pointer;font-size:16px}
.actions{display:grid; grid-template-columns:1fr 1fr; gap:9px} .btn{font-family:var(--sans); font-size:13px; font-weight:600; cursor:pointer; border-radius:9px; padding:11px 12px; border:1px solid var(--edge-2); background:var(--surface); color:var(--ink); transition:.15s; display:flex; align-items:center; justify-content:center; gap:7px} .btn:hover{border-color:var(--ink-faint); background:var(--surface-2)} .btn.primary{grid-column:1/-1; background:var(--accent); color:#fff; border:0; padding:13px}
.tbar{display:flex; align-items:center; gap:12px; padding:9px 18px; border-bottom:1px solid var(--edge); background:var(--surface)}
.tbar.hidden{display:none}
.tctrl{display:flex; gap:5px} .tctrl button{width:32px;height:30px;border-radius:7px;border:1px solid var(--edge-2);background:var(--surface);color:var(--ink-dim);cursor:pointer;display:grid;place-items:center} .tctrl button:hover{color:var(--accent);border-color:var(--accent)} .tctrl button svg{width:13px;height:13px;fill:currentColor}
.scrub{flex:1;min-width:60px} .tread{font-family:var(--mono);font-size:11.5px;color:var(--ink-dim);white-space:nowrap;min-width:120px;text-align:right} .tread b{color:var(--ink);font-weight:600}
.spd{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10.5px;color:var(--ink-faint)} .spd input{width:90px}
.views{padding:12px; overflow:auto; display:grid; gap:12px; grid-template-columns:repeat(auto-fit,minmax(360px,1fr)); grid-auto-rows:minmax(258px,1fr); align-content:start}
.views::-webkit-scrollbar{width:9px}.views::-webkit-scrollbar-thumb{background:var(--edge-2);border-radius:6px}
.plot{position:relative; border:1px solid var(--edge); border-radius:10px; overflow:hidden; background:var(--surface); min-height:258px} .plot canvas{position:absolute; inset:0; width:100%; height:100%; display:block}
@media (max-width:1000px){ body{overflow:auto} .app{height:auto} .layout{grid-template-columns:1fr} .right{height:auto} .views{grid-template-columns:1fr; grid-auto-rows:300px} }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand"><b>model-scope</b> · move a slider, watch the result change</div>
    <nav class="models" id="modelTabs" aria-label="Model"></nav>
    <div class="tip" id="tip"></div>
  </header>
  <div class="layout">
    <aside class="console">
      <div class="block"><div class="lbl">Model</div><div class="blurb" id="blurb"></div><div class="note" id="note"></div></div>
      <div class="block"><div class="lbl">Parameters</div><div id="paramFields" style="display:flex;flex-direction:column;gap:14px"></div></div>
      <div class="block"><div class="lbl">Run</div>
        <div class="field"><div class="row"><label for="seedInput">RNG seed</label></div><div class="seed"><input id="seedInput" type="text" value="model-scope" spellcheck="false"/><button class="dice" id="diceBtn" title="Randomise">⚂</button></div></div>
        <div class="actions"><button class="btn primary" id="runBtn">↻ Re-simulate</button><button class="btn" id="resetBtn">⨯ Reset</button></div>
      </div>
    </aside>
    <div class="right">
      <div class="tbar hidden" id="tbar">
        <div class="tctrl">
          <button id="toStartBtn" title="Restart"><svg viewBox="0 0 16 16"><rect x="3" y="3" width="2" height="10"/><path d="M13 3l-7 5 7 5z"/></svg></button>
          <button id="playBtn" title="Play / pause"><svg id="playIcon" viewBox="0 0 16 16"><path d="M4 3l9 5-9 5z"/></svg></button>
          <button id="toEndBtn" title="Fast-forward to end"><svg viewBox="0 0 16 16"><path d="M3 3l7 5-7 5z"/><rect x="11" y="3" width="2" height="10"/></svg></button>
        </div>
        <input type="range" id="scrub" class="scrub" min="0" max="100" value="0" step="1" aria-label="Step"/>
        <span class="tread" id="tread">0 / 0</span>
        <div class="spd">speed<input type="range" id="spd" min="1" max="400" step="1" value="30"/></div>
      </div>
      <div class="views" id="views"></div>
    </div>
  </div>
</div>
<script src="plot.js"></script>
<script src="modules/mslib.js"></script>   <!-- optional reusable model library (window.MSLIB) -->
<script src="engine.js"></script>
<script>
(function(){
"use strict";
const $=(s,r=document)=>r.querySelector(s); const sleep=()=>new Promise(r=>setTimeout(r));
const clamp=(x,a,b)=>Math.min(b,Math.max(a,x));
const reduceMotion = matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches;
const S={ modelId:SIM.MODEL_ORDER[0], params:{}, seed:'model-scope', data:null, model:null,
  views:[], canvases:[], anim:null, length:1, head:1, playing:false, speed:30, rafId:0, gen:0, suppress:false };

function buildModelTabs(){ const nav=$('#modelTabs'); nav.innerHTML='';
  SIM.MODEL_ORDER.forEach(id=>{ const b=document.createElement('button'); b.textContent=SIM.MODELS[id].name; b.setAttribute('aria-pressed',id===S.modelId); b.onclick=()=>setModel(id); nav.appendChild(b); }); }
function makeField(spec,obj,onChange){ const wrap=document.createElement('div'); wrap.className='field';
  const row=document.createElement('div'); row.className='row'; const lab=document.createElement('label'); lab.textContent=spec.label||spec.name; lab.htmlFor='f_'+spec.name;
  const num=document.createElement('input'); num.className='num'; num.type='number'; num.min=spec.min; num.max=spec.max; num.step=spec.step; num.id='f_'+spec.name;
  if(spec.unit){ const u=document.createElement('span'); u.className='unit'; u.textContent=spec.unit; lab.appendChild(document.createTextNode(' ')); lab.appendChild(u); }
  row.appendChild(lab); row.appendChild(num); const range=document.createElement('input'); range.type='range'; range.min=spec.min; range.max=spec.max; range.step=spec.step;
  wrap.appendChild(row); wrap.appendChild(range);
  const fill=v=>range.style.setProperty('--fill',clamp((v-spec.min)/(spec.max-spec.min)*100,0,100)+'%');
  const apply=v=>{ v=clamp(spec.int?Math.round(v):v,spec.min,spec.max); obj[spec.name]=v; num.value=spec.int?v:+v.toFixed(4); range.value=v; fill(v); onChange&&onChange(); };
  range.addEventListener('input',()=>apply(parseFloat(range.value)));
  num.addEventListener('input',()=>{const v=parseFloat(num.value); if(!Number.isNaN(v)){obj[spec.name]=clamp(v,spec.min,spec.max); range.value=obj[spec.name]; fill(obj[spec.name]); onChange&&onChange();}});
  num.addEventListener('blur',()=>apply(parseFloat(num.value)||spec.default)); apply(obj[spec.name]!==undefined?obj[spec.name]:spec.default); return wrap; }
function setModel(id){ S.suppress=true; stopAll(); S.modelId=id; const m=SIM.MODELS[id]; S.model=m;
  [...$('#modelTabs').children].forEach(b=>b.setAttribute('aria-pressed',b.textContent===m.name));
  $('#blurb').textContent=m.blurb||''; $('#note').textContent=m.note||''; $('#tip').textContent=m.anim?'move a slider · ▶ to watch it build':'move a slider · watch the views update';
  const box=$('#paramFields'); box.innerHTML=''; S.params={}; (m.params||[]).forEach(p=>S.params[p.name]=p.default); (m.params||[]).forEach(p=>box.appendChild(makeField(p,S.params,onChange)));
  // build view cards
  S.views=m.views||[]; const vc=$('#views'); vc.innerHTML=''; S.canvases=S.views.map(()=>{ const d=document.createElement('div'); d.className='plot'; const cv=document.createElement('canvas'); d.appendChild(cv); vc.appendChild(d); return cv; });
  $('#tbar').classList.toggle('hidden', !m.anim);
  S.suppress=false; recompute(); }
function onChange(){ if(!S.suppress) schedule(); }

/* ---- simulate + render ---- */
function recompute(){ stopAll(); const myGen=S.gen; S.seed=$('#seedInput').value||'seed';
  const env={ rng:SIM.makeRNG(S.seed), seed:S.seed, params:{...S.params} };
  try{ S.data=S.model.simulate({...S.params}, env); }catch(e){ S.data=null; console.error(e); }
  if(myGen!==S.gen) return;
  S.length = S.model.anim ? Math.max(1, S.model.anim.length(S.params, S.data)) : 1;
  S.head = (S.model.anim && !reduceMotion) ? 0 : S.length;
  readout(); if(S.model.anim && !reduceMotion){ play(); } else { drawAll(); } }
function drawAll(){ const ui={ head:S.head, playing:S.playing, params:S.params };
  for(let i=0;i<S.views.length;i++){ try{ const g=Plot.make(S.canvases[i]); S.views[i].draw(g, S.data, ui); }catch(e){ try{ Plot.make(S.canvases[i]).note('view error'); }catch(_){} } } }
let rt; function schedule(){ clearTimeout(rt); rt=setTimeout(()=>{ if(!S.suppress) recompute(); }, 220); }

/* ---- playhead (for sequential models) ---- */
function loop(){ if(S.playing){ S.head=Math.min(S.length, S.head + S.speed/60); } drawAll(); readout();
  if(S.playing && S.head<S.length) S.rafId=requestAnimationFrame(loop); else { S.rafId=0; if(S.head>=S.length)S.playing=false; pico(); } }
function play(){ if(S.head>=S.length) S.head=0; S.playing=true; pico(); cancelAnimationFrame(S.rafId); S.rafId=requestAnimationFrame(loop); }
function pause(){ S.playing=false; pico(); }
function stopAll(){ S.gen++; S.playing=false; cancelAnimationFrame(S.rafId); S.rafId=0; }
function readout(){ const k=Math.min(S.length,Math.floor(S.head)); $('#tread').innerHTML=`<b>${k.toLocaleString()}</b> / ${S.length.toLocaleString()}`;
  const sc=$('#scrub'); sc.max=Math.max(1,S.length); sc.value=S.head; sc.style.setProperty('--fill',(S.length?S.head/S.length*100:0)+'%'); }
function pico(){ $('#playIcon').innerHTML=S.playing?'<rect x="4" y="3" width="3" height="10"/><rect x="9" y="3" width="3" height="10"/>':'<path d="M4 3l9 5-9 5z"/>'; }

$('#runBtn').onclick=()=>recompute();
$('#resetBtn').onclick=()=>{ S.suppress=true; stopAll(); (S.model.params||[]).forEach(p=>{const f=$('#f_'+p.name); if(f){f.value=p.default; f.dispatchEvent(new Event('input'));}}); $('#seedInput').value='model-scope'; S.suppress=false; recompute(); };
$('#diceBtn').onclick=()=>{ $('#seedInput').value='seed-'+Math.floor(Math.random()*1e6).toString(36); schedule(); };
$('#seedInput').addEventListener('input',()=>{ if(!S.suppress) schedule(); });
$('#playBtn').onclick=()=>{ if(S.playing)pause(); else play(); };
$('#toStartBtn').onclick=()=>{ S.head=0; play(); };
$('#toEndBtn').onclick=()=>{ pause(); S.head=S.length; drawAll(); readout(); };
$('#scrub').addEventListener('input',()=>{ pause(); S.head=clamp(+$('#scrub').value,0,S.length); drawAll(); readout(); });
$('#spd').addEventListener('input',()=>{ S.speed=+$('#spd').value; });
let zt; const onResize=()=>{ clearTimeout(zt); zt=setTimeout(drawAll,90); };
addEventListener('resize',onResize); new ResizeObserver(onResize).observe($('#views'));

buildModelTabs(); setModel(S.modelId);
if(document.fonts&&document.fonts.ready) document.fonts.ready.then(drawAll);
})();
</script>
</body>
</html>
